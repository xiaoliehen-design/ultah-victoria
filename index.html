<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Invitation Victoria</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section class="hero">
    <p class="label">You are invited to</p>
    <h1>Victoria's 1st Birthday</h1>
    <p class="subtitle">A sweet little princess celebration</p>

    <div class="card">
      <p><strong>Hari/Tanggal:</strong> Minggu, 10 Agustus 2026</p>
      <p><strong>Waktu:</strong> 15.00 WIB</p>
      <p><strong>Tempat:</strong> Akan diisi nanti</p>
    </div>

    <a class="button" href="#rsvp">Konfirmasi Kehadiran</a>
  </section>

  <section id="rsvp" class="section">
    <h2>RSVP</h2>
    <p>Mohon konfirmasi kehadiran melalui WhatsApp.</p>
    <a class="button" href="https://wa.me/6281234567890" target="_blank">
      RSVP via WhatsApp
    </a>
  </section>

  <script src="script.js"></script>
</body>
</html>
